name: 2. Tools B (Mitigasi Keamanan)
# Sistem estafet: Otomatis berjalan setelah "1. Tools A" selesai
on:
  workflow_run:
    workflows: ["1. Tools A (Build & Attack)"]
    types:
      - completed

jobs:
  security-verification:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # Menerima paket yang dikirim dari Ruangan A
      - name: Download Paket dari Ruangan A
        uses: actions/download-artifact@v4
        with:
          name: paket-aplikasi
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: . # <-- FIX: Memastikan file diekstrak di direktori utama, bukan di subfolder

      # =========================================================
      # VERIFIKASI HASIL DARI RUANGAN A
      # =========================================================
      - name: Verify Artifact Signature
        run: |
          echo "[*] Mengecek daftar file yang diterima dari Tools A:"
          ls -la
          
          echo "[*] Memeriksa paket kiriman dari Tools A..."
          
          # FIX: Pembungkam > /dev/null 2>&1 dihapus agar kita bisa melihat error aslinya
          if cosign verify-blob --key cosign.pub --signature release.sig release_build.py; then
              echo "[+] VERIFIKASI SUKSES: Tidak ada penyusup di Tools A."
              echo "[+] Melanjutkan deployment ke Production..."
          else
              echo "=================================================================="
              echo " PERINGATAN KRITIS: INTEGRITAS ARTIFACT GAGAL DIVERIFIKASI "
              echo "=================================================================="
              echo " Trendeteksi file telah disusupi saat berada di Tools A!"
              echo " TINDAKAN OTOMATIS: Proses Deployment DIBATALKAN untuk keamanan!"
              exit 1
          fi
