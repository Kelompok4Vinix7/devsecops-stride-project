name: 2. Tools B (Mitigasi Keamanan)
# Sistem estafet: Otomatis berjalan setelah "1. Ruangan A" selesai
on:
  workflow_run:
    workflows: ["1. Tools A (Build & Attack)"]
    types:
      - completed

jobs:
  security-verification:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # Menerima paket yang dikirim dari Ruangan A
      - name: Download Paket dari Ruangan A
        uses: actions/download-artifact@v4
        with:
          name: paket-aplikasi
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # =========================================================
      # VERIFIKASI HASIL DARI RUANGAN A
      # =========================================================
      - name: Verify Artifact Signature
        run: |
          echo "[*] Memeriksa paket kiriman dari Ruangan A..."
          
          if cosign verify-blob --key cosign.pub --signature release.sig release_build.py > /dev/null 2>&1; then
              echo "[+] VERIFIKASI SUKSES: Tidak ada penyusup di Ruangan A."
              echo "[+] Melanjutkan deployment ke Production..."
          else
              echo "=================================================================="
              echo " PERINGATAN KRITIS: INTEGRITAS ARTIFACT GAGAL DIVERIFIKASI "
              echo "=================================================================="
              echo " Satpam Ruangan B mendeteksi file telah disusupi saat berada di Ruangan A!"
              echo " 🛡️ TINDAKAN OTOMATIS: Proses Deployment DIBATALKAN untuk keamanan!"
              exit 1
          fi
